version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: agendity
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agendity_dev}
      POSTGRES_DB: agendity_production
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (Sidekiq + slot locking)
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NATS (real-time messaging)
  nats:
    image: nats:latest
    environment:
      NATS_AUTH_TOKEN: ${NATS_AUTH_TOKEN:-dev_nats_token}
    volumes:
      - ./docker/nats.conf:/etc/nats/nats.conf:ro
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -c /etc/nats/nats.conf
    restart: unless-stopped

  # Rails API
  api:
    build:
      context: ./agendity-api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://agendity:${POSTGRES_PASSWORD:-agendity_dev}@postgres:5432/agendity_production
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://${NATS_AUTH_TOKEN:-dev_nats_token}@nats:4222
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      AGENDITY_WEB_URL: ${AGENDITY_WEB_URL:-http://localhost:3000}
      API_HOST: ${API_HOST:-http://localhost:3001}
      RAILS_SERVE_STATIC_FILES: "true"
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-agendity.co}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-login}
      SMTP_ENABLE_STARTTLS: ${SMTP_ENABLE_STARTTLS:-true}
      MAILER_FROM: ${MAILER_FROM:-}
    volumes:
      - storage_data:/rails/storage
    ports:
      - "3001:3001"
    command: bundle exec puma -C config/puma.rb -p 3001
    restart: unless-stopped

  # Sidekiq (background jobs)
  sidekiq:
    build:
      context: ./agendity-api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://agendity:${POSTGRES_PASSWORD:-agendity_dev}@postgres:5432/agendity_production
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://${NATS_AUTH_TOKEN:-dev_nats_token}@nats:4222
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      AGENDITY_WEB_URL: ${AGENDITY_WEB_URL:-http://localhost:3000}
      API_HOST: ${API_HOST:-http://localhost:3001}
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-agendity.co}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-login}
      SMTP_ENABLE_STARTTLS: ${SMTP_ENABLE_STARTTLS:-true}
      MAILER_FROM: ${MAILER_FROM:-}
    volumes:
      - storage_data:/rails/storage
    command: bundle exec sidekiq -C config/sidekiq.yml
    restart: unless-stopped

  # Next.js frontend
  web:
    build:
      context: ./agendity-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_NATS_WS_URL: ${NEXT_PUBLIC_NATS_WS_URL:-ws://localhost:8222}
        NEXT_PUBLIC_NATS_AUTH_TOKEN: ${NATS_AUTH_TOKEN:-dev_nats_token}
    depends_on:
      - api
    ports:
      - "3000:3000"
    command: npm run start
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    depends_on:
      - api
      - web
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  storage_data:
