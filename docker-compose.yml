version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: agendify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agendify_dev}
      POSTGRES_DB: agendify_production
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Redis (Sidekiq + slot locking)
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # NATS (real-time messaging)
  nats:
    image: nats:latest
    volumes:
      - ./docker/nats.conf:/etc/nats/nats.conf:ro
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -c /etc/nats/nats.conf
    restart: unless-stopped

  # Rails API
  api:
    build:
      context: ./agendify-api
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
      - nats
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://agendify:${POSTGRES_PASSWORD:-agendify_dev}@postgres:5432/agendify_production
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      AGENDIFY_WEB_URL: ${AGENDIFY_WEB_URL:-http://localhost:3000}
      API_HOST: ${API_HOST:-http://localhost:3001}
      RAILS_SERVE_STATIC_FILES: "true"
    ports:
      - "3001:3001"
    command: bundle exec puma -C config/puma.rb -p 3001
    restart: unless-stopped

  # Sidekiq (background jobs)
  sidekiq:
    build:
      context: ./agendify-api
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
      - nats
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://agendify:${POSTGRES_PASSWORD:-agendify_dev}@postgres:5432/agendify_production
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    command: bundle exec sidekiq
    restart: unless-stopped

  # Next.js frontend
  web:
    build:
      context: ./agendify-web
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_NATS_WS_URL: ${NEXT_PUBLIC_NATS_WS_URL:-ws://localhost:8222}
    ports:
      - "3000:3000"
    command: npm run start
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    depends_on:
      - api
      - web
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
