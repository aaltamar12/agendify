name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e  # Falla si cualquier comando falla

            cd ~/agendify

            echo "==> Fetching and resetting to origin/main..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "==> Ensuring base services are running..."
            docker compose up -d postgres redis nats

            echo "==> Waiting for services to be healthy..."
            sleep 10

            echo "==> Building new images..."
            docker compose build api sidekiq

            echo "==> Running migrations..."
            docker compose run --rm api bundle exec rails db:migrate

            echo "==> Recreating app containers..."
            docker compose up -d --no-deps --force-recreate api sidekiq nginx

            echo "==> Waiting for containers to start..."
            sleep 15

            echo "==> Checking container status..."
            docker compose ps

            echo "==> Showing recent logs..."
            docker compose logs --tail=30 api

            echo "==> Deployment complete!"
